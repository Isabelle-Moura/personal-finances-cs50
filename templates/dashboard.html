{% extends "base.html" %}
{% block content %}
    <div class="container mt-4">
        <div class="row">
            <div class="col-md-12">
                <h2>Hello, {{ user.username }}! 👋</h2>
                <p class="text-muted">Welcome to your personal finances dashboard.</p>
                <hr>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card text-white bg-success mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Incomes</h5>
                        <p class="card-text h3">$ 0.00</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-white bg-danger mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Expenses</h5>
                        <p class="card-text h3">$ 0.00</p>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Total Balance</h5>
                        <p class="card-text h3">$ 0.00</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
